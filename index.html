<!DOCTYPE html>
<html>
<head>
    <title>My First Website</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 30px;
            text-align: center;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        img {
            width: 150px;
            border-radius: 50%;
            margin-bottom: 20px;
        }

        h2 {
            color: #2c3e50;
        }

        p {
            color: #555;
            line-height: 1.6;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
        }

        button:hover {
            background-color: #2980b9;
        }

        footer {
            text-align: center;
            padding: 15px;
            color: #777;
        }
    </style>

</head>

<body>

    <header>
        <h1>Felix Wong</h1>
        <p>Electrical Site Supervisor</p>
    </header>

    <div class="container">

        <img src="https://via.placeholder.com/150" alt="Profile Picture">

        <h2>About Me</h2>
        <p>
            I supervise electrical installation work on-site. 
            I ensure proper termination, guide workers, and maintain safety standards.
        </p>

        <button onclick="showMessage()">Contact Me</button>

    </div>

    <footer>
        <p>© 2026 Felix Wong</p>
    </footer>

    <script>
        function showMessage() {
            alert("Email: your@email.com");
        }
    </script>

</body>
</html>
